<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    {"id":"name","type":"string","label":"Anchor name","default":"AVERY QUINN"},
    {"id":"role","type":"string","label":"Role / context","default":"MODERATOR — ELECTION DESK"},
    {"id":"accent","type":"color","label":"Stripe color","default":"#E0B660"},
    {"id":"side","type":"enum","label":"Anchor side","default":"left","options":[{"value":"left","label":"Left"},{"value":"right","label":"Right"}]}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template id="l3-name-template">
      <div
        data-composition-id="l3-name"
        data-width="1920"
        data-height="1080"
      >
        <style>
          [data-composition-id="l3-name"] {
            position: absolute; inset: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
          }
          [data-composition-id="l3-name"] .plate {
            position: absolute;
            bottom: 110px;
            width: 720px;
            display: flex; flex-direction: column;
            background: rgba(10, 12, 18, 0.94);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            color: #fff;
            opacity: 0;
          }
          [data-composition-id="l3-name"] .plate.left  { left: 96px; }
          [data-composition-id="l3-name"] .plate.right { right: 96px; }
          [data-composition-id="l3-name"] .name {
            font-size: 44px; font-weight: 800; letter-spacing: 0.03em;
            padding: 18px 28px 6px 28px; text-transform: uppercase;
          }
          [data-composition-id="l3-name"] .role {
            font-size: 20px; font-weight: 600; letter-spacing: 0.18em;
            padding: 0 28px 18px 28px;
            text-transform: uppercase;
          }
          [data-composition-id="l3-name"] .stripe {
            height: 4px;
            transform-origin: left center;
          }
        </style>

        <div class="plate clip" data-l3-root data-start="0" data-duration="5" data-track-index="0">
          <div class="name" data-l3-name></div>
          <div class="role" data-l3-role></div>
          <div class="stripe" data-l3-stripe></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function () {
            const defaults = {
              name: "AVERY QUINN",
              role: "MODERATOR — ELECTION DESK",
              accent: "#E0B660",
              side: "left"
            };
            const root = document.querySelector('[data-composition-id="l3-name"]');
            let overrides = {};
            try {
              if (typeof __hyperframes !== "undefined" && __hyperframes && __hyperframes.getVariables) overrides = __hyperframes.getVariables() || {};
              else if (typeof window !== "undefined" && window.__hyperframes && window.__hyperframes.getVariables) overrides = window.__hyperframes.getVariables() || {};
            } catch (_) {}
            if (!overrides || Object.keys(overrides).length === 0) {
              const host = root && root.closest("[data-composition-src]");
              const raw = host && host.getAttribute("data-variable-values");
              if (raw) { try { overrides = JSON.parse(raw) || {}; } catch (_) {} }
            }
            const vars = Object.assign({}, defaults, overrides);
            const plate = root.querySelector(".plate");
            plate.classList.add(vars.side === "right" ? "right" : "left");
            plate.style.borderLeft = "8px solid " + vars.accent;
            root.querySelector("[data-l3-name]").textContent = vars.name;
            const roleEl = root.querySelector("[data-l3-role]");
            roleEl.textContent = vars.role;
            roleEl.style.color = vars.accent;
            const stripe = root.querySelector("[data-l3-stripe]");
            stripe.style.background = vars.accent;

            const fromX = vars.side === "right" ? 60 : -60;
            const dur = 5;
            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            tl.fromTo(plate, { x: fromX, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0)
              .fromTo(stripe, { scaleX: 0 }, { scaleX: 1, duration: 0.6, ease: "power2.out" }, 0.2)
              .to(plate, { opacity: 0, x: fromX * 0.5, duration: 0.4, ease: "power2.in" }, Math.max(0.9, dur - 0.4));
            window.__timelines["l3-name"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>

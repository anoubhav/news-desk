<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    {"id":"kicker","type":"string","label":"Left badge","default":"BREAKING"},
    {"id":"text","type":"string","label":"Headline text","default":"DIVERGENCE DETECTED ON THE PANEL"},
    {"id":"accent","type":"color","label":"Bar color","default":"#FF3A4A"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template id="breaking-bar-template">
      <div
        data-composition-id="breaking-bar"
        data-width="1920"
        data-height="1080"
      >
        <style>
          [data-composition-id="breaking-bar"] {
            position: absolute; inset: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
          }
          [data-composition-id="breaking-bar"] .bar {
            position: absolute; top: 0; left: 0; right: 0;
            height: 86px;
            display: flex; align-items: stretch;
            box-shadow: 0 8px 26px rgba(255, 58, 74, 0.35);
            color: #fff;
            transform: translateY(-100%);
          }
          [data-composition-id="breaking-bar"] .kicker {
            flex: 0 0 auto;
            display: flex; align-items: center; gap: 14px;
            padding: 0 26px;
            background: #0b0d11;
            font-weight: 900; font-size: 26px; letter-spacing: 0.22em;
            color: #fff;
            clip-path: polygon(0 0, 100% 0, calc(100% - 28px) 100%, 0 100%);
          }
          [data-composition-id="breaking-bar"] .pulse {
            width: 16px; height: 16px; border-radius: 50%;
          }
          [data-composition-id="breaking-bar"] .text {
            flex: 1 1 auto;
            display: flex; align-items: center;
            padding: 0 40px;
            font-weight: 800; font-size: 30px; letter-spacing: 0.04em;
            text-transform: uppercase;
          }
        </style>

        <div class="bar clip" data-bb-root data-layout-allow-overflow data-start="0" data-duration="5" data-track-index="0">
          <div class="kicker">
            <span class="pulse" data-bb-pulse></span>
            <span data-bb-kicker></span>
          </div>
          <div class="text" data-bb-text></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function () {
            const defaults = {
              kicker: "BREAKING",
              text: "DIVERGENCE DETECTED ON THE PANEL",
              accent: "#FF3A4A"
            };
            const root = document.querySelector('[data-composition-id="breaking-bar"]');
            let overrides = {};
            try {
              if (typeof __hyperframes !== "undefined" && __hyperframes && __hyperframes.getVariables) overrides = __hyperframes.getVariables() || {};
              else if (typeof window !== "undefined" && window.__hyperframes && window.__hyperframes.getVariables) overrides = window.__hyperframes.getVariables() || {};
            } catch (_) {}
            if (!overrides || Object.keys(overrides).length === 0) {
              const host = root && root.closest("[data-composition-src]");
              const raw = host && host.getAttribute("data-variable-values");
              if (raw) { try { overrides = JSON.parse(raw) || {}; } catch (_) {} }
            }
            const vars = Object.assign({}, defaults, overrides);
            const bar = root.querySelector(".bar");
            bar.style.background = "linear-gradient(90deg, " + vars.accent + " 0%, #c81a2a 100%)";
            const pulse = root.querySelector("[data-bb-pulse]");
            pulse.style.background = vars.accent;
            pulse.style.boxShadow = "0 0 12px " + vars.accent;
            root.querySelector("[data-bb-kicker]").textContent = vars.kicker;
            root.querySelector("[data-bb-text]").textContent = vars.text;

            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            const dur = 5;
            const pulseRepeats = Math.max(1, Math.floor((dur - 1.1) / 0.6));
            tl.to(bar, { y: 0, duration: 0.45, ease: "power3.out" }, 0)
              .to(pulse, { opacity: 0.45, duration: 0.6, yoyo: true, repeat: pulseRepeats, ease: "sine.inOut" }, 0.45)
              .to(bar, { y: "-100%", duration: 0.4, ease: "power3.in" }, Math.max(0.85, dur - 0.4));
            window.__timelines["breaking-bar"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>

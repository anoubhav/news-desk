<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    {"id":"quote","type":"string","label":"Quote text","default":"Separate facts from framing — each side’s strongest claim is a hypothesis, not a verdict."},
    {"id":"attribution","type":"string","label":"Attribution","default":"AVERY QUINN, ELECTION DESK"},
    {"id":"accent","type":"color","label":"Accent color","default":"#E0B660"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template id="pull-quote-template">
      <div
        data-composition-id="pull-quote"
        data-width="1920"
        data-height="1080"
      >
        <style>
          [data-composition-id="pull-quote"] {
            position: absolute; inset: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: #fff;
          }
          [data-composition-id="pull-quote"] .scrim {
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(6,8,12,0.55) 0%, rgba(6,8,12,0.88) 100%);
            opacity: 0;
          }
          [data-composition-id="pull-quote"] .card {
            position: absolute;
            left: 240px; right: 240px; top: 220px;
            opacity: 0;
          }
          [data-composition-id="pull-quote"] .openquote {
            font-size: 220px; line-height: 0.6;
            font-family: Georgia, "Times New Roman", serif;
          }
          [data-composition-id="pull-quote"] .quote {
            font-size: 64px; line-height: 1.2; font-weight: 600;
            margin-top: 28px; max-width: 1320px;
          }
          [data-composition-id="pull-quote"] .rule {
            height: 6px; width: 220px; margin-top: 38px;
            transform-origin: left center;
          }
          [data-composition-id="pull-quote"] .attribution {
            margin-top: 22px;
            font-size: 22px; font-weight: 700; letter-spacing: 0.22em;
            text-transform: uppercase;
          }
        </style>

        <div class="scrim clip" data-pq-scrim data-start="0" data-duration="4.5" data-track-index="0"></div>
        <div class="card clip" data-pq-card data-start="0" data-duration="4.5" data-track-index="1">
          <div class="openquote" data-pq-open>&ldquo;</div>
          <div class="quote" data-pq-quote></div>
          <div class="rule" data-pq-rule></div>
          <div class="attribution" data-pq-attribution></div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function () {
            const defaults = {
              quote: "Separate facts from framing — each side’s strongest claim is a hypothesis, not a verdict.",
              attribution: "AVERY QUINN, ELECTION DESK",
              accent: "#E0B660"
            };
            const root = document.querySelector('[data-composition-id="pull-quote"]');
            let overrides = {};
            try {
              if (typeof __hyperframes !== "undefined" && __hyperframes && __hyperframes.getVariables) overrides = __hyperframes.getVariables() || {};
              else if (typeof window !== "undefined" && window.__hyperframes && window.__hyperframes.getVariables) overrides = window.__hyperframes.getVariables() || {};
            } catch (_) {}
            if (!overrides || Object.keys(overrides).length === 0) {
              const host = root && root.closest("[data-composition-src]");
              const raw = host && host.getAttribute("data-variable-values");
              if (raw) { try { overrides = JSON.parse(raw) || {}; } catch (_) {} }
            }
            const vars = Object.assign({}, defaults, overrides);
            root.querySelector("[data-pq-open]").style.color = vars.accent;
            root.querySelector("[data-pq-quote]").textContent = vars.quote;
            root.querySelector("[data-pq-rule]").style.background = vars.accent;
            const attr = root.querySelector("[data-pq-attribution]");
            attr.textContent = vars.attribution;
            attr.style.color = vars.accent;

            const scrim = root.querySelector("[data-pq-scrim]");
            const card  = root.querySelector("[data-pq-card]");
            const rule  = root.querySelector("[data-pq-rule]");

            const dur = 4.5;
            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            tl.to(scrim, { opacity: 1, duration: 0.4, ease: "power2.out" }, 0)
              .fromTo(card, { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.55, ease: "power3.out" }, 0.1)
              .fromTo(rule, { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.out" }, 0.45)
              .to(card,  { opacity: 0, y: -16, duration: 0.4, ease: "power2.in" }, Math.max(0.95, dur - 0.45))
              .to(scrim, { opacity: 0, duration: 0.45, ease: "power2.in" }, Math.max(1.0, dur - 0.45));
            window.__timelines["pull-quote"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>

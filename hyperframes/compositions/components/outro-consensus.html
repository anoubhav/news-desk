<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    {"id":"topic","type":"string","label":"Topic / kicker","default":"TONIGHT ON THE PANEL"},
    {"id":"consensus","type":"string","label":"Pipe-separated agreement points","default":"All three desks confirm the timeline.|All three flag the credibility risk.|All three expect a market reaction."},
    {"id":"divergence","type":"string","label":"Pipe-separated split points","default":"Who absorbs the cost.|Whether the institution recovers credibility.|What the next concrete signal is."}
  ]'
>
  <head>
    <meta charset="UTF-8" />
  </head>
  <body>
    <template id="outro-consensus-template">
      <div
        data-composition-id="outro-consensus"
        data-width="1920"
        data-height="1080"
      >
        <style>
          [data-composition-id="outro-consensus"] {
            position: absolute; inset: 0;
            background: linear-gradient(135deg, #0a0c12 0%, #14182a 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            color: #fff;
          }
          [data-composition-id="outro-consensus"] .grid {
            position: absolute; inset: 0;
            background-image:
              linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
              linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
            background-size: 80px 80px;
            opacity: 0;
          }
          [data-composition-id="outro-consensus"] .topic {
            position: absolute; left: 96px; top: 80px;
            font-size: 22px; font-weight: 800; letter-spacing: 0.32em;
            color: #E0B660; text-transform: uppercase;
            opacity: 0;
          }
          [data-composition-id="outro-consensus"] .title {
            position: absolute; left: 96px; top: 130px;
            font-size: 64px; font-weight: 800; letter-spacing: -0.01em;
            opacity: 0;
          }
          [data-composition-id="outro-consensus"] .col {
            position: absolute; top: 280px; width: 800px;
            opacity: 0;
          }
          [data-composition-id="outro-consensus"] .col.left  { left: 96px;  border-left: 6px solid #38C172; }
          [data-composition-id="outro-consensus"] .col.right { right: 96px; border-left: 6px solid #E07262; }
          [data-composition-id="outro-consensus"] .col h3 {
            padding: 0 0 14px 24px;
            font-size: 22px; font-weight: 800; letter-spacing: 0.22em;
            text-transform: uppercase;
          }
          [data-composition-id="outro-consensus"] .col.left h3  { color: #38C172; }
          [data-composition-id="outro-consensus"] .col.right h3 { color: #E07262; }
          [data-composition-id="outro-consensus"] ul {
            list-style: none; padding: 0 24px 24px 24px;
            display: flex; flex-direction: column; gap: 14px;
          }
          [data-composition-id="outro-consensus"] li {
            font-size: 24px; line-height: 1.3; font-weight: 500;
            opacity: 0;
          }
          [data-composition-id="outro-consensus"] li::before {
            content: ""; display: inline-block;
            width: 10px; height: 10px; border-radius: 50%;
            margin-right: 16px; vertical-align: middle;
            background: currentColor;
          }
        </style>

        <div class="grid clip" data-oc-grid data-start="0" data-duration="9" data-track-index="0"></div>
        <div class="topic clip" data-oc-topic data-start="0" data-duration="9" data-track-index="1"></div>
        <div class="title clip" data-oc-title data-start="0" data-duration="9" data-track-index="1">WHERE THEY AGREE — AND WHERE THEY SPLIT</div>
        <div class="col left clip" data-oc-left data-start="0" data-duration="9" data-track-index="2">
          <h3>Consensus</h3>
          <ul data-oc-consensus-list></ul>
        </div>
        <div class="col right clip" data-oc-right data-start="0" data-duration="9" data-track-index="2">
          <h3>Divergence</h3>
          <ul data-oc-divergence-list></ul>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
        <script>
          (function () {
            const defaults = {
              topic: "TONIGHT ON THE PANEL",
              consensus: "All three desks confirm the timeline.|All three flag the credibility risk.|All three expect a market reaction.",
              divergence: "Who absorbs the cost.|Whether the institution recovers credibility.|What the next concrete signal is."
            };
            const root = document.querySelector('[data-composition-id="outro-consensus"]');
            let overrides = {};
            try {
              if (typeof __hyperframes !== "undefined" && __hyperframes && __hyperframes.getVariables) overrides = __hyperframes.getVariables() || {};
              else if (typeof window !== "undefined" && window.__hyperframes && window.__hyperframes.getVariables) overrides = window.__hyperframes.getVariables() || {};
            } catch (_) {}
            if (!overrides || Object.keys(overrides).length === 0) {
              const host = root && root.closest("[data-composition-src]");
              const raw = host && host.getAttribute("data-variable-values");
              if (raw) { try { overrides = JSON.parse(raw) || {}; } catch (_) {} }
            }
            const vars = Object.assign({}, defaults, overrides);
            root.querySelector("[data-oc-topic]").textContent = vars.topic;

            const consensus = String(vars.consensus).split("|").map(s => s.trim()).filter(Boolean);
            const divergence = String(vars.divergence).split("|").map(s => s.trim()).filter(Boolean);
            const cList = root.querySelector("[data-oc-consensus-list]");
            const dList = root.querySelector("[data-oc-divergence-list]");
            for (const t of consensus) { const li = document.createElement("li"); li.textContent = t; cList.appendChild(li); }
            for (const t of divergence) { const li = document.createElement("li"); li.textContent = t; dList.appendChild(li); }

            window.__timelines = window.__timelines || {};
            const tl = gsap.timeline({ paused: true });
            tl.to(root.querySelector("[data-oc-grid]"),  { opacity: 1, duration: 0.6, ease: "power2.out" }, 0)
              .fromTo(root.querySelector("[data-oc-topic]"), { y: 10, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.2)
              .fromTo(root.querySelector("[data-oc-title]"), { y: 20, opacity: 0 }, { y: 0, opacity: 1, duration: 0.6, ease: "power3.out" }, 0.35)
              .fromTo(root.querySelector("[data-oc-left]"),  { x: -24, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.7)
              .fromTo(root.querySelector("[data-oc-right]"), { x:  24, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, 0.85)
              .fromTo(cList.querySelectorAll("li"), { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, stagger: 0.15, ease: "power2.out" }, 1.0)
              .fromTo(dList.querySelectorAll("li"), { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, stagger: 0.15, ease: "power2.out" }, 1.2);
            window.__timelines["outro-consensus"] = tl;
          })();
        </script>
      </div>
    </template>
  </body>
</html>

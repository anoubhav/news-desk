<!doctype html>
<html
  lang="en"
  data-resolution="landscape"
  data-composition-variables='[
    {"id":"manifestUrl","type":"string","label":"Path to manifest JSON (relative to project root)","default":"manifests/dev-session.json"}
  ]'
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #050608;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: #fff;
      }
      /* Title card */
      #title-card {
        position: absolute; inset: 0;
        display: flex; flex-direction: column;
        align-items: flex-start; justify-content: center;
        padding: 0 120px;
        background:
          radial-gradient(circle at 30% 30%, rgba(224, 182, 96, 0.16) 0%, transparent 55%),
          linear-gradient(135deg, #0a0c12 0%, #14182a 100%);
      }
      #title-card .topic {
        font-size: 28px; font-weight: 800; letter-spacing: 0.32em;
        color: #E0B660; text-transform: uppercase;
        opacity: 0;
      }
      #title-card .title {
        margin-top: 18px;
        font-size: 92px; font-weight: 800; letter-spacing: -0.015em;
        line-height: 1.05;
        max-width: 1500px;
        opacity: 0;
      }
      #title-card .rule {
        margin-top: 32px;
        height: 8px; width: 280px;
        background: #E0B660;
        transform-origin: left center;
        transform: scaleX(0);
      }
      /* Clip stage */
      .clip-stage {
        position: absolute; inset: 0;
        background: #050608;
        opacity: 0;
      }
      .clip-stage video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
      }
      /* L3 plate on each clip */
      .clip-l3 {
        position: absolute;
        bottom: 110px; left: 96px;
        width: 720px;
        background: rgba(10, 12, 18, 0.94);
        box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        opacity: 0;
      }
      .clip-l3 .stripe { height: 4px; transform-origin: left center; }
      .clip-l3 .name {
        font-size: 44px; font-weight: 800; letter-spacing: 0.03em;
        padding: 18px 28px 6px; text-transform: uppercase;
      }
      .clip-l3 .role {
        font-size: 20px; font-weight: 600; letter-spacing: 0.18em;
        padding: 0 28px 18px; text-transform: uppercase;
      }
      /* OTS card on each clip (when we have a citation) */
      .clip-ots {
        position: absolute;
        top: 168px; right: 80px;
        width: 540px;
        background: rgba(10, 12, 18, 0.94);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 16px 40px rgba(0,0,0,0.45);
        opacity: 0;
      }
      .clip-ots .head {
        display: flex; align-items: center; justify-content: space-between;
        padding: 14px 22px 8px;
      }
      .clip-ots .label {
        font-size: 16px; font-weight: 700; letter-spacing: 0.24em;
        text-transform: uppercase;
      }
      .clip-ots .outlet {
        font-size: 16px; font-weight: 800; letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .clip-ots .headline {
        font-size: 24px; font-weight: 600; line-height: 1.35;
        padding: 6px 22px 22px;
      }
      .clip-ots .footer { height: 6px; transform-origin: left center; }
      /* Outro */
      #outro {
        position: absolute; inset: 0;
        background: linear-gradient(135deg, #0a0c12 0%, #14182a 100%);
        opacity: 0;
      }
      #outro .topic {
        position: absolute; left: 96px; top: 80px;
        font-size: 22px; font-weight: 800; letter-spacing: 0.32em;
        color: #E0B660; text-transform: uppercase;
      }
      #outro .title {
        position: absolute; left: 96px; top: 130px;
        font-size: 64px; font-weight: 800; letter-spacing: -0.01em;
      }
      #outro .col {
        position: absolute; top: 280px; width: 800px;
      }
      #outro .col.left  { left: 96px;  border-left: 6px solid #38C172; }
      #outro .col.right { right: 96px; border-left: 6px solid #E07262; }
      #outro h3 {
        padding: 0 0 14px 24px;
        font-size: 22px; font-weight: 800; letter-spacing: 0.22em;
        text-transform: uppercase;
      }
      #outro .col.left h3  { color: #38C172; }
      #outro .col.right h3 { color: #E07262; }
      #outro ul {
        list-style: none; padding: 0 0 24px 24px;
        display: flex; flex-direction: column; gap: 14px;
      }
      #outro li {
        font-size: 24px; line-height: 1.3; font-weight: 500;
        opacity: 0;
      }
      #outro li::before {
        content: ""; display: inline-block;
        width: 10px; height: 10px; border-radius: 50%;
        margin-right: 14px; vertical-align: middle;
        background: currentColor;
      }
      /* Persistent PRISM brand watermark — top-right corner across the whole reel. */
      #brand-mark {
        position: absolute;
        top: 56px; right: 96px;
        display: flex; flex-direction: column;
        align-items: flex-end; gap: 8px;
        opacity: 0.94;
        z-index: 50;
        pointer-events: none;
      }
      #brand-mark .brand-label {
        font-size: 30px; font-weight: 800; letter-spacing: 0.34em;
        color: #E0B660; text-transform: uppercase;
        text-shadow: 0 2px 8px rgba(0,0,0,0.55);
      }
      #brand-mark .brand-stripe {
        display: block;
        width: 72px; height: 3px;
        background: #E0B660;
        box-shadow: 0 0 12px rgba(224, 182, 96, 0.6);
      }
    </style>
  </head>
  <body>
    <!--
      Highlight reel composition. Loads a manifest JSON whose path is provided
      via the `manifestUrl` variable (default points to a dev manifest). The
      timeline is *built dynamically* from the manifest so the same composition
      handles any number of clips.

      Each clip slot has:
        - The recorded webm playing inside (muted: voice is in the webm's own audio track)
        - L3 name plate slides in for 1.5s, holds, slides out 0.4s before end
        - OTS source card (if citation present) appears for ~3s mid-clip

      Outro card shows consensus + divergence bullets.

      Total duration = (title 4s) + sum(clip durations clamped to 6s each) + (outro 8s).
    -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="60"
      data-width="1920"
      data-height="1080"
    >
      <div id="title-card" class="clip" data-start="0" data-duration="4" data-track-index="0">
        <div class="topic" id="title-topic">TONIGHT ON THE PANEL</div>
        <div class="title" id="title-headline">Election Desk Recap</div>
        <div class="rule" id="title-rule"></div>
      </div>

      <div id="clip-stage-host"></div>

      <div id="brand-mark" class="clip" data-start="0" data-duration="60" data-track-index="9">
        <span class="brand-label">PRISM</span>
        <span class="brand-stripe"></span>
      </div>

      <div id="outro" class="clip" data-start="50" data-duration="10" data-track-index="0">
        <div class="topic" id="outro-topic">TONIGHT ON THE PANEL</div>
        <div class="title">WHERE THEY AGREE — AND WHERE THEY SPLIT</div>
        <div class="col left">
          <h3>Consensus</h3>
          <ul id="outro-consensus"></ul>
        </div>
        <div class="col right">
          <h3>Divergence</h3>
          <ul id="outro-divergence"></ul>
        </div>
      </div>
    </div>

    <script>
      (async function () {
        // Variables: prefer top-level injected `window.__hfVariables` (set by
        // the render CLI or by an injecting middleware); fallback to data-attr
        // defaults via getVariables() if available; final fallback is the dev
        // manifest path.
        let manifestUrl = "manifests/dev-session.json";
        try {
          if (window.__hfVariables && window.__hfVariables.manifestUrl) {
            manifestUrl = window.__hfVariables.manifestUrl;
          } else if (window.__hyperframes && typeof window.__hyperframes.getVariables === "function") {
            const v = window.__hyperframes.getVariables();
            if (v && v.manifestUrl) manifestUrl = v.manifestUrl;
          }
        } catch (_) { /* keep default */ }

        let manifest;
        try {
          const res = await fetch(manifestUrl, { cache: "no-store" });
          manifest = await res.json();
        } catch (err) {
          console.error("highlight-reel: failed to load manifest", manifestUrl, err);
          return;
        }

        const TITLE_DUR = 4;
        const OUTRO_DUR = 10;
        const CLIP_DUR = 6;
        const titleTopic = document.getElementById("title-topic");
        const titleHead = document.getElementById("title-headline");
        titleTopic.textContent = (manifest.keywords && manifest.keywords[0]) ? manifest.keywords[0].toUpperCase() : "TONIGHT ON THE PANEL";
        titleHead.textContent = manifest.topic || "Election Desk Recap";

        // Build clip slots
        const clipHost = document.getElementById("clip-stage-host");
        const clips = Array.isArray(manifest.clips) ? manifest.clips : [];
        const clipNodes = [];
        clips.forEach((c, i) => {
          const start = TITLE_DUR + i * CLIP_DUR;
          const stage = document.createElement("div");
          stage.className = "clip-stage clip";
          stage.id = "clip-stage-" + i;
          stage.setAttribute("data-start", String(start));
          stage.setAttribute("data-duration", String(CLIP_DUR));
          stage.setAttribute("data-track-index", "1");

          const video = document.createElement("video");
          video.src = c.clipUrl;
          video.muted = false;
          video.playsInline = true;
          video.preload = "auto";
          stage.appendChild(video);

          // L3
          const l3 = document.createElement("div");
          l3.className = "clip-l3";
          l3.innerHTML = `
            <div class="name">${(c.anchorLabel || "").toUpperCase()}</div>
            <div class="role" style="color:${c.accent || "#E0B660"}">${roleFor(c.anchorId)}</div>
            <div class="stripe" style="background:${c.accent || "#E0B660"}"></div>
          `;
          l3.style.borderLeft = `8px solid ${c.accent || "#E0B660"}`;
          stage.appendChild(l3);

          // OTS (optional)
          let ots = null;
          if (c.outlet || c.citationHeadline) {
            ots = document.createElement("div");
            ots.className = "clip-ots";
            ots.innerHTML = `
              <div class="head">
                <div class="label" style="color:${c.accent || "#E0B660"}">SOURCE</div>
                <div class="outlet">${escapeHtml((c.outlet || "REPORTING").toUpperCase())}</div>
              </div>
              <div class="headline">${escapeHtml(c.citationHeadline || c.pullQuote || "")}</div>
              <div class="footer" style="background: linear-gradient(90deg, ${c.accent || "#E0B660"}, rgba(255,255,255,0.05))"></div>
            `;
            ots.style.borderTop = `4px solid ${c.accent || "#E0B660"}`;
            stage.appendChild(ots);
          }
          clipHost.appendChild(stage);
          clipNodes.push({ stage, l3, ots, start, dur: CLIP_DUR, accent: c.accent || "#E0B660" });
        });

        // Outro lists
        const cList = document.getElementById("outro-consensus");
        const dList = document.getElementById("outro-divergence");
        const consensus = manifest.consensusPoints || [];
        const divergence = manifest.divergencePoints || [];
        for (const t of consensus) {
          const li = document.createElement("li");
          li.style.color = "#38C172";
          li.textContent = t;
          cList.appendChild(li);
        }
        for (const t of divergence) {
          const li = document.createElement("li");
          li.style.color = "#E07262";
          li.textContent = t;
          dList.appendChild(li);
        }

        // Update root + outro start time based on clip count
        const totalDur = TITLE_DUR + clips.length * CLIP_DUR + OUTRO_DUR;
        const root = document.getElementById("root");
        root.setAttribute("data-duration", String(totalDur));
        const outro = document.getElementById("outro");
        const outroStart = TITLE_DUR + clips.length * CLIP_DUR;
        outro.setAttribute("data-start", String(outroStart));
        outro.setAttribute("data-duration", String(OUTRO_DUR));
        const brand = document.getElementById("brand-mark");
        if (brand) brand.setAttribute("data-duration", String(totalDur));

        // Timeline
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true });
        // Title card animation
        tl.fromTo("#title-card .topic", { y: 12, opacity: 0 }, { y: 0, opacity: 1, duration: 0.5, ease: "power2.out" }, 0.2);
        tl.fromTo("#title-card .title", { y: 24, opacity: 0 }, { y: 0, opacity: 1, duration: 0.7, ease: "power3.out" }, 0.4);
        tl.fromTo("#title-card .rule", { scaleX: 0 }, { scaleX: 1, duration: 0.55, ease: "power2.out" }, 0.6);
        tl.to("#title-card", { opacity: 0, duration: 0.4, ease: "power2.in" }, TITLE_DUR - 0.4);
        // Clips
        clipNodes.forEach((cn) => {
          tl.set(cn.stage, { opacity: 1 }, cn.start);
          tl.call(() => { try { cn.stage.querySelector("video")?.play?.(); } catch (_) {} }, [], cn.start);
          // L3 in
          tl.fromTo(cn.l3, { x: -60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, cn.start + 0.4);
          tl.fromTo(cn.l3.querySelector(".stripe"), { scaleX: 0 }, { scaleX: 1, duration: 0.55, ease: "power2.out" }, cn.start + 0.55);
          tl.to(cn.l3, { opacity: 0, x: -30, duration: 0.4, ease: "power2.in" }, cn.start + cn.dur - 0.6);
          // OTS in/out (mid-clip)
          if (cn.ots) {
            tl.fromTo(cn.ots, { x: 60, opacity: 0 }, { x: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, cn.start + 1.6);
            tl.fromTo(cn.ots.querySelector(".footer"), { scaleX: 0 }, { scaleX: 1, duration: 0.5, ease: "power2.out" }, cn.start + 1.8);
            tl.to(cn.ots, { x: 30, opacity: 0, duration: 0.4, ease: "power2.in" }, cn.start + cn.dur - 0.5);
          }
          // Stage out at end (so next clip stacks cleanly)
          tl.to(cn.stage, { opacity: 0, duration: 0.3, ease: "power2.in" }, cn.start + cn.dur - 0.3);
        });
        // Outro
        tl.fromTo("#outro", { opacity: 0 }, { opacity: 1, duration: 0.5, ease: "power2.out" }, outroStart);
        tl.fromTo("#outro li", { y: 14, opacity: 0 }, { y: 0, opacity: 1, duration: 0.4, stagger: 0.12, ease: "power2.out" }, outroStart + 0.5);
        window.__timelines["main"] = tl;

        function roleFor(anchorId) {
          if (anchorId === "left") return "LEFT-SIDE ANALYST — ELECTION DESK";
          if (anchorId === "right") return "RIGHT-SIDE ANALYST — ELECTION DESK";
          return "MODERATOR — ELECTION DESK";
        }
        function escapeHtml(s) {
          return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#39;" }[c] || c));
        }
      })();
    </script>
  </body>
</html>

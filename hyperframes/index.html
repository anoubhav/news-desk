<!doctype html>
<html lang="en" data-resolution="landscape">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: radial-gradient(ellipse at center, #11141d 0%, #050608 100%);
      }
      #stage-bg {
        position: absolute; inset: 0;
        background-image:
          linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 40%),
          radial-gradient(circle at 25% 60%, rgba(224,114,98,0.18) 0%, transparent 35%),
          radial-gradient(circle at 50% 60%, rgba(224,182,96,0.18) 0%, transparent 35%),
          radial-gradient(circle at 75% 60%, rgba(90,143,230,0.18) 0%, transparent 35%);
      }
    </style>
  </head>
  <body>
    <!--
      Showcase composition: cycles through every shared component on a faux newsroom backdrop.
      Used for `npm run dev` preview, `npm run check` lint coverage, and a smoke render test.
      In the real app, these same components are mounted individually via @hyperframes/player.
    -->
    <div
      id="root"
      data-composition-id="main"
      data-start="0"
      data-duration="22"
      data-width="1920"
      data-height="1080"
    >
      <div id="stage-bg" class="clip" data-start="0" data-duration="22" data-track-index="0"></div>

      <!-- Always-on: bottom ticker (full 22s) -->
      <div
        id="el-ticker"
        class="clip"
        data-start="0"
        data-duration="22"
        data-track-index="1"
        data-composition-id="ticker"
        data-composition-src="compositions/components/ticker.html"
        data-variable-values='{
          "label": "ELECTION DESK",
          "items": "All three desks confirm the timeline | Markets watching for next signal | Memo authenticity still off the record | Cole: incentives have shifted | Maya: who absorbs the cost",
          "accent": "#E0B660",
          "speedSeconds": 32
        }'
      ></div>

      <!-- t=0-5s: BREAKING bar (top) -->
      <div
        id="el-breaking"
        class="clip"
        data-start="0"
        data-duration="5"
        data-track-index="2"
        data-composition-id="breaking-bar"
        data-composition-src="compositions/components/breaking-bar.html"
        data-variable-values='{
          "kicker": "BREAKING",
          "text": "Divergence detected on the panel",
          "accent": "#FF3A4A"
        }'
      ></div>

      <!-- t=2-9s: L3 name plate (Maya, left side, red accent) -->
      <div
        id="el-l3-maya"
        class="clip"
        data-start="2"
        data-duration="7"
        data-track-index="3"
        data-composition-id="l3-name"
        data-composition-src="compositions/components/l3-name.html"
        data-variable-values='{
          "name": "MAYA REYES",
          "role": "LEFT-SIDE ANALYST — ELECTION DESK",
          "accent": "#E07262",
          "side": "left"
        }'
      ></div>

      <!-- t=4-11s: OTS source card (right side, gold) -->
      <div
        id="el-ots-1"
        class="clip"
        data-start="4"
        data-duration="7"
        data-track-index="4"
        data-composition-id="ots-card"
        data-composition-src="compositions/components/ots-card.html"
        data-variable-values='{
          "outlet": "REUTERS",
          "headline": "Three newsrooms confirm the same memo, sources still off the record.",
          "label": "SOURCE",
          "accent": "#E0B660",
          "side": "right"
        }'
      ></div>

      <!-- t=11-16s: pull-quote fullscreen -->
      <div
        id="el-pullquote"
        class="clip"
        data-start="11"
        data-duration="5"
        data-track-index="5"
        data-composition-id="pull-quote"
        data-composition-src="compositions/components/pull-quote.html"
        data-variable-values='{
          "quote": "Separate facts from framing — each side’s strongest claim is a hypothesis, not a verdict.",
          "attribution": "AVERY QUINN, ELECTION DESK",
          "accent": "#E0B660"
        }'
      ></div>

      <!-- t=14-22s: outro consensus/divergence -->
      <div
        id="el-outro"
        class="clip"
        data-start="14"
        data-duration="8"
        data-track-index="6"
        data-composition-id="outro-consensus"
        data-composition-src="compositions/components/outro-consensus.html"
        data-variable-values='{
          "topic": "TONIGHT ON THE PANEL",
          "consensus": "All three desks confirm the timeline.|All three flag the credibility risk.|All three expect a market reaction.",
          "divergence": "Who absorbs the cost.|Whether the institution recovers credibility.|What the next concrete signal is."
        }'
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      window.__timelines["main"] = gsap.timeline({ paused: true });
    </script>
  </body>
</html>
